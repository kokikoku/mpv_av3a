name: mpv-android ARMv7 + AV3A SINGLE APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      ################################################
      # 1. Checkout
      ################################################
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      ################################################
      # 2. Install dependencies
      ################################################
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git wget unzip curl \
            openjdk-17-jdk

      ################################################
      # 3. Android SDK (use GitHub default only)
      ################################################
      - name: Set Android SDK env (FIX CONFLICT)
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      ################################################
      # 4. Clone mpv-android
      ################################################
      - name: Clone mpv-android
        run: |
          git clone --recursive https://github.com/mpv-android/mpv-android.git
          cd mpv-android
          git submodule update --init --recursive

      ################################################
      # 5. Inject AV3A decoder
      ################################################
      - name: Inject AV3A
        run: |
          cd mpv-android
          mkdir -p buildscripts/ffmpeg/libavcodec
          git clone https://github.com/nilaoda/av3a_decoder \
            buildscripts/ffmpeg/libavcodec/av3a_decoder || true

      ################################################
      # 6. FORCE SINGLE APK (NO YAML / NO EOF / SAFE PATCH)
      ################################################
      - name: Force single APK build
        run: |
          cd mpv-android

          # 删除可能存在的 split 配置（避免冲突）
          sed -i '/splits {/,/}/d' app/build.gradle || true

          # 用安全追加方式写入
          printf "\nandroid {\n    splits {\n        abi {\n            enable false\n        }\n    }\n}\n" >> app/build.gradle

      ################################################
      # 7. Build APK (Gradle ONLY)
      ################################################
      - name: Build APK
        run: |
          cd mpv-android
          chmod +x gradlew

          ./gradlew clean
          ./gradlew assembleDebug

      ################################################
      # 8. Show output APK
      ################################################
      - name: List APK files
        run: |
          find mpv-android -name "*.apk"

      ################################################
      # 9. Upload artifact
      ################################################
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-armv7-av3a-single-apk
          path: |
            mpv-android/**/app/build/outputs/apk/**/*.apk
