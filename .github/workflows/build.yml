name: mpv-android ARMv7 + AV3A

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      ####################################
      # 1. Dependencies
      ####################################
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            git build-essential python3 \
            cmake ninja-build meson \
            nasm yasm curl wget unzip \
            openjdk-17-jdk

      ####################################
      # 2. Android SDK/NDK
      ####################################
      - name: Install Android NDK
        run: |
          mkdir -p $HOME/android
          cd $HOME/android

          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip

          echo "NDK=$HOME/android/android-ndk-r25c" >> $GITHUB_ENV
          echo "TOOLCHAIN=$HOME/android/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      ####################################
      # 3. mpv-android source
      ####################################
      - name: Clone mpv-android
        run: |
          git clone --recursive https://github.com/mpv-android/mpv-android.git

      ####################################
      # 4. Patch FFmpeg (AV3A)
      ####################################
      - name: Inject AV3A decoder
        run: |
          cd mpv-android

          git clone https://github.com/nilaoda/av3a_decoder \
            buildscripts/ffmpeg/libavcodec/av3a_decoder || true

      ####################################
      # 5. Build ARMv7 APK
      ####################################
      - name: Build APK
        run: |
          cd mpv-android

          export ANDROID_NDK=$NDK

          ./buildall.sh \
            armv7a \
            release

      ####################################
      # 6. Upload APK
      ####################################
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-armv7-av3a-apk
          path: |
            mpv-android/build/outputs/**/*.apk
