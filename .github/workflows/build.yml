name: mpv-android ARMv7 AV3A (Stable Gradle Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git wget unzip openjdk-17-jdk

      - name: Install Android SDK (cmdline tools)
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Clone mpv-android
        run: |
          git clone --recursive https://github.com/mpv-android/mpv-android.git

      - name: Inject AV3A
        run: |
          cd mpv-android
          mkdir -p buildscripts/ffmpeg/libavcodec
          git clone https://github.com/nilaoda/av3a_decoder \
            buildscripts/ffmpeg/libavcodec/av3a_decoder || true

      - name: Build with Gradle (NO 127 POSSIBLE)
        run: |
          cd mpv-android
          chmod +x gradlew

          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-armv7-av3a-apk
          path: mpv-android/**/*.apk
